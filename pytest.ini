[pytest]
; Only collect from tests/ — src/test_vrc.py is a manual script that
; performs a real VRChat login and must never be collected by pytest.
testpaths = tests
addopts = -q
; discord.py's (unused) voice module imports stdlib audioop, which warns on
; Python 3.12. On 3.13+ discord.py depends on the audioop-lts backport
; instead, so production (3.14 image) is unaffected. This bot never uses
; voice — the warning is pure noise in test output.
filterwarnings =
    ignore:'audioop' is deprecated:DeprecationWarning
